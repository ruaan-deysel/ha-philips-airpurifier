# Explicit core integrations for local development.
# This intentionally avoids problematic defaults that pulled in `usb`,
# `bluetooth`, and `go2rtc` on this environment.
frontend:
config:
history:
logbook:
map:
sun:
conversation:
media_source:
my:
zeroconf:
dhcp:
ssdp:
stream:

# https://www.home-assistant.io/integrations/homeassistant/
homeassistant:
  debug: true

# https://www.home-assistant.io/integrations/logger/
logger:
  default: info
  logs:
    custom_components.philips_airpurifier: debug
